<!DOCTYPE html>
<html>
<head><meta charset='utf-8'><title>Bulk STK Push</title></head>
<body>
<h2>Bulk STK Push Dashboard</h2>
<textarea id='numbers' rows='12' cols='50' placeholder='One number per line'></textarea><br><br>
<input id='amount' placeholder='Amount'><br><br>
<input id='reference' placeholder='Reference'><br><br>
<button onclick='startBulk()'>Send STK Push</button>
<pre id='output'></pre>
<script>
async function startBulk(){
 const numbers=document.getElementById('numbers').value.split('\n').filter(x=>x.trim());
 const amount=document.getElementById('amount').value;
 const reference=document.getElementById('reference').value;

 document.getElementById('output').textContent='Processing...';

 const r=await fetch('/api/bulk-stk',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({numbers,amount,reference})
 });

 const data=await r.json();
 document.getElementById('output').textContent=JSON.stringify(data,null,2);
}
</script>
</body>
</html>
